
<div class="movie-card" (click)="navigateToDetail()" *ngIf="movie">
  <div class="position-relative">
    <img *ngIf="movie.imagenPortada" 
         [src]="'/' + movie.imagenPortada" 
         [alt]="movie.titulo">
  </div>
  
  <div class="movie-info">
    <div class="movie-title">{{ movie.titulo }}</div>
    <div class="movie-year">{{ movie.anio }}</div>
    <div class="movie-genre">{{ movie.genero }}</div>
    <div class="rating">{{ getRatingStars(movie.rating) }}</div>
  </div>
</div>
