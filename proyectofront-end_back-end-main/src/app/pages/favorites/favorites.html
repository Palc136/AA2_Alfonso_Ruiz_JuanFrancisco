<div class="container my-4">
  <h2 class="section-title">Mis Películas Favoritas</h2>
  
  <div *ngIf="!hasFavorites()" class="text-center mt-4">
    <i class="fas fa-heart-broken fa-3x mb-3"></i>
    <h4>No tienes películas favoritas aún</h4>
    <p>Agrega películas a tus favoritos haciendo clic en el corazón en la página de detalles.</p>
    <a routerLink="/movies" class="btn btn-primary">Explorar películas</a>
  </div>

  <div *ngIf="hasFavorites()" class="row">
    <div *ngFor="let movie of favoriteMovies" class="col-6 col-sm-4 col-md-3 col-lg-2 mb-4">
      <app-movie-card [movie]="movie"></app-movie-card>
    </div>
  </div>
</div>
